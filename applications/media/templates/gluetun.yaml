apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: gluetun-vpn-credentials
  namespace: media
spec:
  encryptedData:
    token: 
  template:
    metadata:
      name: gluetun-vpn-credentials
      namespace: media
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gluetun
  labels:
    app.kubernetes.io/name: gluetun
    app.kubernetes.io/part-of: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gluetun
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gluetun
    spec:
      nodeSelector:
        {{- toYaml .Values.media.nodeSelector | nindent 8 }}
      containers:
        - name: gluetun
          image: qmcgaw/gluetun:latest
          ports:
            - containerPort: 8888
              name: http-proxy
            - containerPort: 8080
              name: qbit-http
          env:
            - name: VPN_SERVICE_PROVIDER
              value: nordvpn
            - name: VPN_TYPE
              value: openvpn
            - name: OPENVPN_USER
              valueFrom:
                secretKeyRef:
                  name: gluetun-vpn-credentials
                  key: token
            - name: OPENVPN_PASSWORD
              value: "nordvpn"
            - name: SERVER_COUNTRIES
              value: Singapore
            - name: HTTPPROXY
              value: "on"
            - name: HTTPPROXY_LISTENING_ADDRESS
              value: ":8888"
            - name: FIREWALL_INPUT_PORTS
              value: "8888,8080"
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
        - name: qbittorrent
          image: "{{ .Values.qbittorrent.image.repository }}:{{ .Values.qbittorrent.image.tag }}"
          ports:
            - containerPort: 8080
              name: http
          env:
            {{- toYaml .Values.env | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
          resources:
            {{- toYaml .Values.qbittorrent.resources | nindent 12 }}
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: media
          persistentVolumeClaim:
            claimName: media-data
---
apiVersion: v1
kind: Service
metadata:
  name: gluetun
spec:
  selector:
    app.kubernetes.io/name: gluetun
  ports:
    - port: 8888
      targetPort: http-proxy
      name: http-proxy
