apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyseerr-config
  labels:
    app.kubernetes.io/name: jellyseerr
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.media.storageClass }}
  resources:
    requests:
      storage: {{ .Values.jellyseerr.configStorageSize }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyseerr
  labels:
    app.kubernetes.io/name: jellyseerr
    app.kubernetes.io/part-of: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jellyseerr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jellyseerr
    spec:
      nodeSelector:
        {{- toYaml .Values.media.nodeSelector | nindent 8 }}
      containers:
        - name: jellyseerr
          image: "{{ .Values.jellyseerr.image.repository }}:{{ .Values.jellyseerr.image.tag }}"
          ports:
            - containerPort: 5055
              name: http
          env:
            {{- toYaml .Values.env | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/config
          resources:
            {{- toYaml .Values.jellyseerr.resources | nindent 12 }}
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyseerr-config
---
apiVersion: v1
kind: Service
metadata:
  name: jellyseerr
spec:
  selector:
    app.kubernetes.io/name: jellyseerr
  ports:
    - port: 5055
      targetPort: http
      name: http
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyseerr
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`jellyseerr.{{ .Values.domain }}`)
      kind: Rule
      services:
        - name: jellyseerr
          port: 5055
