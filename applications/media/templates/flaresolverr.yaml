apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaresolverr
  labels:
    app.kubernetes.io/name: flaresolverr
    app.kubernetes.io/part-of: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flaresolverr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flaresolverr
    spec:
      containers:
        - name: flaresolverr
          image: "{{ .Values.flaresolverr.image.repository }}:{{ .Values.flaresolverr.image.tag }}"
          ports:
            - containerPort: 8191
              name: http
          env:
            - name: LOG_LEVEL
              value: info
          resources:
            {{- toYaml .Values.flaresolverr.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: flaresolverr
spec:
  selector:
    app.kubernetes.io/name: flaresolverr
  ports:
    - port: 8191
      targetPort: http
      name: http
