apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prowlarr-config
  labels:
    app.kubernetes.io/name: prowlarr
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.media.storageClass }}
  resources:
    requests:
      storage: {{ .Values.prowlarr.configStorageSize }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prowlarr
  labels:
    app.kubernetes.io/name: prowlarr
    app.kubernetes.io/part-of: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prowlarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prowlarr
    spec:
      containers:
        - name: prowlarr
          image: "{{ .Values.prowlarr.image.repository }}:{{ .Values.prowlarr.image.tag }}"
          ports:
            - containerPort: 9696
              name: http
          env:
            {{- toYaml .Values.env | nindent 12 }}
            - name: HTTP_PROXY
              value: http://gluetun:8888
            - name: HTTPS_PROXY
              value: http://gluetun:8888
            - name: NO_PROXY
              value: "localhost,127.0.0.1,10.0.0.0/8,192.168.0.0/16,flaresolverr,sonarr,radarr,qbittorrent,jellyfin,bazarr,gluetun,.svc,.svc.cluster.local"
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            {{- toYaml .Values.prowlarr.resources | nindent 12 }}
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: prowlarr-config
---
apiVersion: v1
kind: Service
metadata:
  name: prowlarr
spec:
  selector:
    app.kubernetes.io/name: prowlarr
  ports:
    - port: 9696
      targetPort: http
      name: http
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prowlarr
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`prowlarr.{{ .Values.domain }}`)
      kind: Rule
      services:
        - name: prowlarr
          port: 9696
