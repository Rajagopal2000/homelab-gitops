apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: applications
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/Rajagopal2000/homelab-gitops
        revision: HEAD
        directories:
          - path: applications/*
  template:
    metadata:
      name: "app-{{.path.basename}}"
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: homelab
        app.kubernetes.io/component: application
    spec:
      project: default
      source:
        repoURL: https://github.com/Rajagopal2000/homelab-gitops
        targetRevision: HEAD
        path: "{{.path.path}}"
        helm:
          valueFiles:
            - values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.path.basename}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
