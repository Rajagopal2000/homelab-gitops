apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: headscale-data
  labels:
    app.kubernetes.io/name: headscale
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: {{ .Values.headscale.configStorageSize }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: headscale
  labels:
    app.kubernetes.io/name: headscale
    app.kubernetes.io/part-of: headscale
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: headscale
  template:
    metadata:
      labels:
        app.kubernetes.io/name: headscale
    spec:
      containers:
        - name: headscale
          image: "{{ .Values.headscale.image.repository }}:{{ .Values.headscale.image.tag }}"
          command:
            - headscale
            - serve
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: metrics
            - containerPort: 3478
              name: stun
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /etc/headscale/config.yaml
              subPath: config.yaml
            - name: config
              mountPath: /etc/headscale/acl.yaml
              subPath: acl.yaml
            - name: data
              mountPath: /var/lib/headscale
            - name: oidc-secret
              mountPath: /etc/headscale/oidc-secret
              subPath: client-secret
          resources:
            {{- toYaml .Values.headscale.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: headscale-config
        - name: data
          persistentVolumeClaim:
            claimName: headscale-data
        - name: oidc-secret
          secret:
            secretName: headscale-oidc-secret
---
apiVersion: v1
kind: Service
metadata:
  name: headscale
spec:
  selector:
    app.kubernetes.io/name: headscale
  ports:
    - port: 8080
      targetPort: http
      name: http
    - port: 3478
      targetPort: stun
      protocol: UDP
      name: stun
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: headscale
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`headscale.{{ .Values.domain }}`)
      kind: Rule
      services:
        - name: headscale
          port: 8080
