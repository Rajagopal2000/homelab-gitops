apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: tailscale-subnet-router-auth
  namespace: headscale
spec:
  encryptedData:
    authkey: 
  template:
    metadata:
      name: tailscale-subnet-router-auth
      namespace: headscale
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tailscale-subnet-router
  labels:
    app.kubernetes.io/name: tailscale-subnet-router
    app.kubernetes.io/part-of: headscale
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tailscale-subnet-router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tailscale-subnet-router
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: tailscale
          image: tailscale/tailscale:latest
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-subnet-router-auth
                  key: authkey
            - name: TS_LOGIN_SERVER
              value: http://headscale.headscale.svc:8080
            - name: TS_ROUTES
              value: "192.168.4.0/24"
            - name: TS_USERSPACE
              value: "true"
            - name: TS_HOSTNAME
              value: "k8s-subnet-router"
            - name: TS_STATE_DIR
              value: /var/lib/tailscale
          volumeMounts:
            - name: state
              mountPath: /var/lib/tailscale
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
      volumes:
        - name: state
          emptyDir: {}
