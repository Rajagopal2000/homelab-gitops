apiVersion: apps/v1
kind: Deployment
metadata:
  name: headscale-ui
  labels:
    app.kubernetes.io/name: headscale-ui
    app.kubernetes.io/part-of: headscale
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: headscale-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: headscale-ui
    spec:
      containers:
        - name: headscale-ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          ports:
            - containerPort: 443
              name: https
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: headscale-ui
spec:
  selector:
    app.kubernetes.io/name: headscale-ui
  ports:
    - port: 443
      targetPort: https
      name: https
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: headscale-ui-transport
spec:
  insecureSkipVerify: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: headscale-ui
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`headscale-ui.{{ .Values.domain }}`)
      kind: Rule
      services:
        - name: headscale-ui
          port: 443
          scheme: https
          serversTransport: headscale-ui-transport
