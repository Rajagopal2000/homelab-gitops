---
apiVersion: v1
kind: Service
metadata:
  name: proxmox-external
spec:
  ports:
    - port: 8006
      targetPort: 8006
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: proxmox-external
subsets:
  - addresses:
      - ip: 192.168.4.185
    ports:
      - port: 8006
        protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: proxmox-transport
spec:
  insecureSkipVerify: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: proxmox
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`proxmox.rajagopaliyer.com`)
      kind: Rule
      services:
        - name: proxmox-external
          port: 8006
          scheme: https
          serversTransport: proxmox-transport
