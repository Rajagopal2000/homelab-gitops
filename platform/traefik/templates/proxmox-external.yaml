---
apiVersion: v1
kind: Service
metadata:
  name: proxmox-external
spec:
  ports:
    - port: 8006
      targetPort: 8006
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: proxmox-external-1
  labels:
    kubernetes.io/service-name: proxmox-external
addressType: IPv4
endpoints:
  - addresses:
      - 192.168.4.185
ports:
  - port: 8006
    protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: proxmox-transport
spec:
  insecureSkipVerify: true
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: proxmox
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`proxmox.rajagopaliyer.com`)
      kind: Rule
      services:
        - name: proxmox-external
          port: 8006
          scheme: https
          serversTransport: traefik-proxmox-transport@kubernetescrd
