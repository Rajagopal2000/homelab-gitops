apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
    spec:
      containers:
        - name: keycloak
          image: "{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}"
          args:
            - start
            - --hostname=https://keycloak.{{ .Values.domain }}
            - --hostname-backchannel-dynamic=true
            - --proxy-headers=xforwarded
            - --http-enabled=true
            - --health-enabled=true
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://keycloak-postgres:5432/keycloak
            - name: KC_DB_USERNAME
              value: keycloak
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-db-credentials
                  key: password
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-credentials
                  key: username
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-credentials
                  key: password
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
          volumeMounts:
            {{- /* Reconstruct themes/chella/login/<path> from the
                   ConfigMap's flattened keys. Keys use `__` as the path
                   separator (see themes-configmap.yaml); this list must
                   stay in sync with the files under
                   themes/chella/login/. */}}
            - name: theme-chella
              mountPath: /opt/keycloak/themes/chella/login/theme.properties
              subPath: theme.properties
            - name: theme-chella
              mountPath: /opt/keycloak/themes/chella/login/template.ftl
              subPath: template.ftl
            - name: theme-chella
              mountPath: /opt/keycloak/themes/chella/login/login.ftl
              subPath: login.ftl
            - name: theme-chella
              mountPath: /opt/keycloak/themes/chella/login/messages/messages_en.properties
              subPath: messages__messages_en.properties
            - name: theme-chella
              mountPath: /opt/keycloak/themes/chella/login/resources/css/styles.css
              subPath: resources__css__styles.css
            - name: theme-chella
              mountPath: /opt/keycloak/themes/chella/login/resources/img/logo.svg
              subPath: resources__img__logo.svg
      volumes:
        - name: theme-chella
          configMap:
            name: keycloak-theme-chella
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
spec:
  selector:
    app.kubernetes.io/name: keycloak
  ports:
    - port: 8080
      targetPort: http
      name: http
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: keycloak
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`keycloak.{{ .Values.domain }}`)
      kind: Rule
      services:
        - name: keycloak
          port: 8080
